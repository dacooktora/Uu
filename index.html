<style>

.journey-section{

position:relative;
overflow:hidden;

}

.journey-timeline{

display:flex;
flex-direction:column;
gap:40px;

}

.journey-row{

display:flex;
align-items:center;
justify-content:space-between;

}

.journey-row.right{

justify-content:flex-end;
gap:25px;

}

.journey-row.left{

justify-content:flex-start;
gap:25px;

}

.journey-card{

position:relative;
width:320px;
height:130px;

display:flex;
align-items:center;
gap:15px;

padding:20px;

border-radius:30px;

background:rgba(18,18,18,.95);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

box-shadow:
0 20px 40px rgba(0,0,0,.5),
inset 0 0 25px rgba(255,255,255,.02);

transition:.5s;

cursor:pointer;

}

.journey-card:hover{

transform:
translateY(-8px)
rotateX(8deg)
scale(1.02);

}

.journey-thumb{

width:75px;
height:95px;

border-radius:20px;

overflow:hidden;
flex-shrink:0;

}

.journey-thumb img{

width:100%;
height:100%;

object-fit:cover;

}

.journey-content h3{

margin:0;
font-size:1.3rem;
color:#fff;

}

.journey-content p{

margin-top:8px;
color:#aaa;

}

.journey-number{

position:absolute;
top:-15px;
right:-15px;

width:60px;
height:60px;

border-radius:50%;

background:#D6B98C;

display:flex;
justify-content:center;
align-items:center;

font-size:1.4rem;
font-weight:bold;
color:black;

}

.journey-arrow{

font-size:65px;
color:#D6B98C;

animation:
moveArrow 1.5s infinite;

}

@keyframes moveArrow{

0%{

transform:translateX(0);

}

50%{

transform:translateX(10px);

}

100%{

transform:translateX(0);

}

}


@media(max-width:768px){

.journey-card{

width:250px;
height:100px;
padding:15px;

}

.journey-thumb{

width:55px;
height:70px;

}

.journey-content h3{

font-size:1rem;

}

.journey-content p{

font-size:.8rem;

}

.journey-arrow{

}

}
