<style>

.journey-section{

position:relative;
overflow:hidden;

}

.journey-glow{

position:absolute;

width:500px;
height:500px;

background:#D6B98C;

filter:blur(200px);

opacity:.05;

top:20%;
left:-100px;

}

.journey-list{

display:flex;
flex-direction:column;

gap:25px;

}


.story-card{

display:flex;

align-items:center;

gap:15px;

padding:15px;

background:
rgba(20,20,20,.95);

border-radius:30px;

border:1px solid rgba(255,255,255,.05);

box-shadow:
0 15px 40px rgba(0,0,0,.5);

cursor:pointer;

transition:.6s;

transform-style:preserve-3d;

}


.story-card:hover{

transform:
perspective(1000px)
rotateX(8deg)
translateY(-10px);

}


.episode{

min-width:65px;
height:65px;

border-radius:50%;

background:#D6B98C;

display:flex;

align-items:center;
justify-content:center;

font-weight:bold;

color:black;

}


.story-image{

width:70px;
height:100px;

border-radius:20px;

overflow:hidden;

flex-shrink:0;

}


.story-image img{

width:100%;
height:100%;

object-fit:cover;

}


.story-text h3{

margin:0;

font-size:1.2rem;

color:white;

}


.story-text p{

margin-top:6px;

color:#aaa;

font-size:.9rem;

}



.journey-modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,.95);

z-index:9999;

display:none;

align-items:center;

justify-content:center;

padding:25px;

}


.journey-modal-content{

width:100%;
max-width:500px;

position:relative;

}


.journey-close{

position:absolute;

right:0;

top:-50px;

font-size:35px;

color:white;

cursor:pointer;

}



#journeyVideo{

width:100%;

height:450px;

border-radius:25px;

object-fit:cover;

margin-bottom:20px;

}



.journey-gallery{

display:flex;

gap:10px;

overflow:auto;

}


.journey-gallery img{

width:100px;
height:150px;

border-radius:20px;

object-fit:cover;

}


</style>




<script>

const journeyData=[

{

video:"video1.mp4",

photos:[
"1a.jpg",
"1b.jpg",
"1c.jpg"
]

},

{

video:"video2.mp4",

photos:[
"2a.jpg",
"2b.jpg",
"2c.jpg"
]

},

{

video:"video3.mp4",

photos:[
"3a.jpg",
"3b.jpg",
"3c.jpg"
]

},

{

video:"video4.mp4",

photos:[
"4a.jpg",
"4b.jpg",
"4c.jpg"
]

},

{

video:"video5.mp4",

photos:[
"5a.jpg",
"5b.jpg",
"5c.jpg"
]

},

{

video:"video6.mp4",

photos:[
"6a.jpg",
"6b.jpg",
"6c.jpg"
]

}

];



function openJourney(id){

let modal=
document.getElementById(
"journeyModal"
);

let video=
document.getElementById(
"journeyVideo"
);

let gallery=
document.getElementById(
"journeyGallery"
);

video.src=
journeyData[id].video;

gallery.innerHTML="";


journeyData[id]
.photos
.forEach(photo=>{

gallery.innerHTML+=`

<img src="${photo}">

`;

});


modal.style.display=
"flex";

video.play();

}



function closeJourney(){

let modal=
document.getElementById(
"journeyModal"
);

let video=
document.getElementById(
"journeyVideo"
);

modal.style.display=
"none";

video.pause();

}



</script>
